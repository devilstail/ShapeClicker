<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Clicker Deluxe</title>
<style>
    :root {
        --bg-color: #0a192f;
        --panel-bg: #112240;
        --border-color: #233554;
        --text-main: #e6f1ff;
        --text-dim: #8892b0;
        --accent: #64ffda;
        --unaffordable: #ef5350;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        height: 100vh;
        width: 100vw;
        display: flex;
        overflow: hidden;
    }

    /* Toggleable Glow */
    body.no-glow * { box-shadow: none !important; text-shadow: none !important; }

    #left-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    #right-panel { width: 380px; background-color: var(--panel-bg); display: flex; flex-direction: column; border-left: 2px solid var(--border-color); z-index: 100; }

    #shapes-display { font-size: 3rem; font-weight: bold; text-shadow: 0 0 10px var(--accent); }
    #sps-display { font-size: 1.2rem; color: var(--text-dim); margin-bottom: 30px; }

    #main-button {
        width: 160px; height: 160px; background-color: #1d4ed8;
        border: 4px solid #60a5fa; border-radius: 15px;
        box-shadow: 0 0 25px rgba(37, 99, 235, 0.6);
        cursor: pointer; transition: transform 0.05s; outline: none;
    }
    #main-button:active { transform: scale(0.95); }

    /* Falling Shapes */
    .falling-shape { position: absolute; pointer-events: none; z-index: 5; top: -50px; }
    .shape-f-square { width: 30px; height: 30px; background: #3b82f6; border: 2px solid #60a5fa; }
    .shape-f-circle { width: 30px; height: 30px; background: #10b981; border: 2px solid #34d399; border-radius: 50%; }
    .shape-f-triangle { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #f59e0b; }

    .particle { position: absolute; font-weight: bold; color: white; pointer-events: none; z-index: 100; }

    #scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
    .item-card {
        background: rgba(255,255,255,0.03); border: 1px solid var(--border-color);
        padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
    }
    .item-card:hover { background: rgba(255,255,255,0.08); }
    .item-card.unaffordable { opacity: 0.5; cursor: not-allowed; }
    
    .item-info { display: flex; flex-direction: column; }
    .item-name { font-weight: bold; font-size: 1.1rem; }
    .item-cost { font-size: 0.9rem; color: var(--accent); }
    .item-count { font-size: 1.8rem; font-weight: bold; opacity: 0.3; }

    /* Modal */
    #menu-btn { position: absolute; top: 20px; right: 20px; padding: 8px 16px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; }
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
    #modal-content { background: var(--panel-bg); width: 500px; padding: 25px; border-radius: 10px; border: 1px solid var(--border-color); }
    .tab-content { margin-top: 20px; }
    .setting-row { display: flex; justify-content: space-between; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 5px; }

    #notif-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .notif { background: var(--panel-bg); border: 1px solid var(--accent); padding: 10px 20px; margin-top: 5px; border-radius: 5px; animation: slide 0.3s; }
    @keyframes slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
</style>
</head>
<body>

<div id="left-panel">
    <div id="shapes-display">0 Shapes</div>
    <div id="sps-display">0 shapes/sec</div>
    <button id="main-button"></button>
    <button id="menu-btn">Settings / Stats</button>
</div>

<div id="right-panel">
    <div style="padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: bold;">SHOP</div>
    <div id="scroll-area">
        <div id="upgrades-container"></div>
        <div id="buildings-container"></div>
    </div>
</div>

<div id="modal">
    <div id="modal-content">
        <h2 style="color: var(--accent)">Settings & Stats</h2>
        <div class="tab-content">
            <h3 style="margin-bottom: 10px;">Preferences</h3>
            <div class="setting-row">
                <span>Enable Falling Shapes</span>
                <input type="checkbox" id="set-particles" checked>
            </div>
            <div class="setting-row">
                <span>Enable Glow Effects</span>
                <input type="checkbox" id="set-glow" checked>
            </div>
            <h3 style="margin-top: 20px; margin-bottom: 10px;">Statistics</h3>
            <div id="stats-area"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="saveGame(false)" style="flex: 1; padding: 10px; background: var(--accent); color: #000; border: none; cursor: pointer;">Manual Save</button>
                <button onclick="wipeSave()" style="flex: 1; padding: 10px; background: var(--unaffordable); color: #fff; border: none; cursor: pointer;">Wipe Progress</button>
            </div>
        </div>
        <button onclick="closeModal()" style="margin-top: 20px; width: 100%; padding: 10px; background: #334155; color: #fff; border: none; cursor: pointer;">Close</button>
    </div>
</div>

<div id="notif-container"></div>

<script>
    // CORE GAME STATE - Everything in one object for easy saving
    let state = {
        shapes: 0,
        totalShapes: 0,
        clicks: 0,
        buildings: {
            line: { count: 0, baseCost: 15, prod: 0.2, name: 'Line' },
            triangle: { count: 0, baseCost: 100, prod: 1, name: 'Triangle' },
            square: { count: 0, baseCost: 1100, prod: 8, name: 'Square' }
        },
        upgrades: {
            megaClick: { bought: false, cost: 500, name: 'Mega Click', desc: 'Clicks are 5x stronger' }
        },
        settings: {
            particles: true,
            glow: true
        }
    };

    let autoSpawnBuffer = 0;
    let clickParticleCount = 0;
    const MAX_CLICK_PARTICLES = 5;

    // --- SAVING LOGIC ---
    function saveGame(quiet = true) {
        localStorage.setItem('shapeClickerSave_v2', JSON.stringify(state));
        if (!quiet) notify("Game Saved!");
    }

    function loadGame() {
        const saved = localStorage.getItem('shapeClickerSave_v2');
        if (saved) {
            const parsed = JSON.parse(saved);
            // Merge saved data into state to handle potential game updates
            state = { ...state, ...parsed };
            // Apply settings immediately
            document.getElementById('set-particles').checked = state.settings.particles;
            document.getElementById('set-glow').checked = state.settings.glow;
            applyGlow(state.settings.glow);
        }
        renderShop();
    }

    function wipeSave() {
        if (confirm("Are you sure? This deletes ALL shapes forever!")) {
            localStorage.removeItem('shapeClickerSave_v2');
            location.reload();
        }
    }

    // --- UI & NOTIFICATIONS ---
    function notify(msg) {
        const n = document.createElement('div'); n.className = 'notif'; n.innerText = msg;
        document.getElementById('notif-container').appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    function applyGlow(enabled) {
        document.body.classList.toggle('no-glow', !enabled);
    }

    function updateStats() {
        document.getElementById('stats-area').innerHTML = `
            <p>Total Shapes Produced: ${Math.floor(state.totalShapes)}</p>
            <p>Total Button Clicks: ${state.clicks}</p>
        `;
    }

    // --- GAMEPLAY ---
    function getSPS() {
        let sps = 0;
        for (let b in state.buildings) sps += state.buildings[b].count * state.buildings[b].prod;
        return sps;
    }

    function getClickPower() {
        return state.upgrades.megaClick.bought ? 5 : 1;
    }

    function spawnShape() {
        if (!state.settings.particles) return;
        const types = ['square', 'circle', 'triangle'];
        const el = document.createElement('div');
        el.className = `falling-shape shape-f-${types[Math.floor(Math.random()*3)]}`;
        el.style.left = Math.random() * window.innerWidth + 'px';
        document.body.appendChild(el);

        let y = -50, rot = 0, speed = 3 + Math.random() * 3;
        function fall() {
            y += speed; rot += 0.75;
            el.style.transform = `translateY(${y}px) rotate(${rot}deg)`;
            if (y < window.innerHeight + 50) requestAnimationFrame(fall);
            else el.remove();
        }
        requestAnimationFrame(fall);
    }

    function createClickParticle(x, y, amt) {
        if (clickParticleCount >= MAX_CLICK_PARTICLES) return;
        clickParticleCount++;
        
        const p = document.createElement('div');
        p.className = 'particle'; p.innerText = `+${amt}`;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p);

        let op = 1, py = y;
        function anim() {
            op -= 0.02; py -= 1;
            p.style.opacity = op; p.style.top = py + 'px';
            if (op > 0) requestAnimationFrame(anim);
            else { p.remove(); clickParticleCount--; }
        }
        requestAnimationFrame(anim);
    }

    // --- SHOP LOGIC ---
    function renderShop() {
        const bContainer = document.getElementById('buildings-container');
        bContainer.innerHTML = '';
        for (let id in state.buildings) {
            const b = state.buildings[id];
            const cost = Math.floor(b.baseCost * Math.pow(1.15, b.count));
            const card = document.createElement('div');
            card.className = `item-card ${state.shapes < cost ? 'unaffordable' : ''}`;
            card.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${b.name}</span>
                    <span class="item-cost">Cost: ${cost}</span>
                </div>
                <div class="item-count">${b.count}</div>
            `;
            card.onclick = () => buyBuilding(id);
            bContainer.appendChild(card);
        }

        const uContainer = document.getElementById('upgrades-container');
        uContainer.innerHTML = '';
        for (let id in state.upgrades) {
            const u = state.upgrades[id];
            if (u.bought) continue;
            const card = document.createElement('div');
            card.className = `item-card ${state.shapes < u.cost ? 'unaffordable' : ''}`;
            card.innerHTML = `
                <div class="item-info">
                    <span class="item-name">${u.name}</span>
                    <span class="item-cost">Cost: ${u.cost}</span>
                    <small>${u.desc}</small>
                </div>
            `;
            card.onclick = () => buyUpgrade(id);
            uContainer.appendChild(card);
        }
    }

    function buyBuilding(id) {
        const b = state.buildings[id];
        const cost = Math.floor(b.baseCost * Math.pow(1.15, b.count));
        if (state.shapes >= cost) {
            state.shapes -= cost;
            b.count++;
            renderShop();
            saveGame();
        }
    }

    function buyUpgrade(id) {
        const u = state.upgrades[id];
        if (state.shapes >= u.cost) {
            state.shapes -= u.cost;
            u.bought = true;
            renderShop();
            saveGame();
        }
    }

    // --- EVENT LISTENERS ---
    document.getElementById('main-button').onmousedown = (e) => {
        const pwr = getClickPower();
        state.shapes += pwr;
        state.totalShapes += pwr;
        state.clicks++;
        spawnShape();
        createClickParticle(e.clientX, e.clientY, pwr);
        renderShop();
    };

    document.getElementById('menu-btn').onclick = () => {
        updateStats();
        document.getElementById('modal').style.display = 'flex';
    };

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    document.getElementById('set-particles').onchange = (e) => {
        state.settings.particles = e.target.checked;
        saveGame();
    };

    document.getElementById('set-glow').onchange = (e) => {
        state.settings.glow = e.target.checked;
        applyGlow(state.settings.glow);
        saveGame();
    };

    // --- MAIN LOOP ---
    let lastTime = performance.now();
    let autoSaveTicker = 0;

    function loop(time) {
        const dt = time - lastTime; lastTime = time;
        const sps = getSPS();
        
        if (sps > 0) {
            const gained = sps * (dt / 1000);
            state.shapes += gained;
            state.totalShapes += gained;
            autoSpawnBuffer += gained;
        }

        // Auto-production falling shapes (capped at 25/sec = 40ms interval)
        if (autoSpawnBuffer >= 1) {
            spawnShape();
            autoSpawnBuffer--;
        }

        autoSaveTicker += dt;
        if (autoSaveTicker > 30000) { // Auto-save every 30s
            saveGame();
            autoSaveTicker = 0;
        }

        document.getElementById('shapes-display').innerText = Math.floor(state.shapes) + " Shapes";
        document.getElementById('sps-display').innerText = sps.toFixed(1) + " shapes/sec";
        
        requestAnimationFrame(loop);
    }

    // Initialize
    loadGame();
    requestAnimationFrame(loop);

</script>
</body>
</html>
